<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Registration Form</title>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background-color:peru;
}

.form-container{
    background-color: wheat;
    padding:25px;
    border-radius:10px;
    box-shadow:whitesmoke;
}


</style>

</head>

<body>

<div class="container mt-5">

<h2 class="text-center mb-4">Student Registration Form</h2>

<div class="form-container">

<form id="studentForm">

<!-- Name -->
<div class="mb-3">
<label class="form-label">Name</label>
<input type="text" id="name" class="form-control">
</div>

<!-- Email -->
<div class="mb-3">
<label class="form-label">Email</label>
<input type="text" id="email" class="form-control">
</div>

<!-- Phone -->
<div class="mb-3">
<label class="form-label">Phone Number</label>
<input type="text" id="phone" class="form-control">
</div>

<!-- Course -->
<div class="mb-3">
<label class="form-label">Course</label>
<select id="course" class="form-select">
<option value="">Select Course</option>
<option>BE</option>
<option>BTech</option>
<option>BCA</option>
<option>MCA</option>
</select>
</div>

<!-- Gender -->
<div class="mb-3">
<label class="form-label">Gender</label><br>

<div class="form-check form-check-inline">
<input class="form-check-input" type="radio" name="gender" value="Male">
<label class="form-check-label">Male</label>
</div>

<div class="form-check form-check-inline">
<input class="form-check-input" type="radio" name="gender" value="Female">
<label class="form-check-label">Female</label>
</div>

</div>

<!-- Skills -->
<div class="mb-3">
<label class="form-label">Skills</label><br>

<div class="form-check form-check-inline">
<input class="form-check-input skill" type="checkbox" value="HTML">
<label class="form-check-label">HTML</label>
</div>

<div class="form-check form-check-inline">
<input class="form-check-input skill" type="checkbox" value="CSS">
<label class="form-check-label">CSS</label>
</div>

<div class="form-check form-check-inline">
<input class="form-check-input skill" type="checkbox" value="JavaScript">
<label class="form-check-label">JavaScript</label>
</div>

</div>

<!-- Address -->
<div class="mb-3">
<label class="form-label">Address</label>
<textarea id="address" class="form-control"></textarea>
</div>

<!-- Submit -->
<button type="submit" class="btn btn-warning w-100">Register</button>

</form>

</div>

<!-- Result Display -->
<div id="resultCard"></div>

</div>

<script>

document.getElementById("studentForm").addEventListener("submit", function(e){

e.preventDefault();

let name = document.getElementById("name").value.trim();
let email = document.getElementById("email").value.trim();
let phone = document.getElementById("phone").value.trim();
let course = document.getElementById("course").value;
let address = document.getElementById("address").value;

let gender = document.querySelector('input[name="gender"]:checked');
let skills = document.querySelectorAll(".skill:checked");

let skillList = [];

skills.forEach(function(skill){
skillList.push(skill.value);
});

if(name === ""){
alert("Name cannot be empty");
return;
}

if(!email.includes("@")){
alert("Email must contain @");
return;
}

if(phone.length !== 10 || isNaN(phone)){
alert("Phone number must be 10 digits");
return;
}

let genderValue = gender ? gender.value : "Not Selected";

let result = `
<div class="card shadow">
<div class="card-body">
<h4 class="card-title">Student Details</h4>
<p><b>Name:</b> ${name}</p>
<p><b>Email:</b> ${email}</p>
<p><b>Phone:</b> ${phone}</p>
<p><b>Course:</b> ${course}</p>
<p><b>Gender:</b> ${genderValue}</p>
<p><b>Skills:</b> ${skillList.join(", ")}</p>
<p><b>Address:</b> ${address}</p>
</div>
</div>
`;

document.getElementById("resultCard").innerHTML = result;

});

</script>

</body>
</html>
