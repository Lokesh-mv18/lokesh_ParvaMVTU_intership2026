<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Asynchronous in js</h1>
    <p>by default js is synchronous(main thread)-it will execute the program line by line</p>
    <p>asynchrons is used in api calls,db queries,file handlinh etc.</p>


    <script>
        //synchronous
        console.log("first");
        console.log("second");
        console.log("third");
        console.log("fourth");
        console.log("fifth");
        
        //asyn.
        console.log("1");
        console.log("2");

        //this wont execte by js(browser will execte)
        setTimeout(()=>{
            console.log("async");

        },3000);
        console.log("3");
        console.log("4");

    </script>
</body>
</html>
